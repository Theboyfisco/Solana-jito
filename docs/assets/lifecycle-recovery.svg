<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0a0a0b"/>
  <defs>
    <style>
      .title{font:800 32px Inter,Arial,sans-serif;fill:#fff}
      .sub{font:500 15px Inter,Arial,sans-serif;fill:#8b8b92}
      .node{fill:#121214;stroke:#2a2a2d;stroke-width:2}
      .ok{fill:#121214;stroke:#d4ff00;stroke-width:3}
      .warn{fill:#15110d;stroke:#f59e0b;stroke-width:3}
      .bad{fill:#170d12;stroke:#f43f5e;stroke-width:3}
      .ai{fill:#121021;stroke:#8b5cf6;stroke-width:3}
      .label{font:800 18px "JetBrains Mono",Consolas,monospace;fill:#fff}
      .small{font:500 13px Inter,Arial,sans-serif;fill:#a1a1aa}
      .arrow{stroke:#d4ff00;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .arrowWarn{stroke:#f59e0b;stroke-width:3;fill:none;marker-end:url(#arrowWarn)}
      .arrowBad{stroke:#f43f5e;stroke-width:3;fill:none;marker-end:url(#arrowBad)}
      .arrowAi{stroke:#8b5cf6;stroke-width:3;fill:none;marker-end:url(#arrowAi)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#d4ff00"/></marker>
    <marker id="arrowWarn" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="arrowBad" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#f43f5e"/></marker>
    <marker id="arrowAi" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#8b5cf6"/></marker>
  </defs>

  <text x="56" y="62" class="title">Lifecycle And Autonomous Recovery Flow</text>
  <text x="56" y="92" class="sub">The judge gauntlet exercises normal landing, insufficient tip, expired blockhash, and skipped leader paths</text>

  <rect x="70" y="160" width="170" height="82" rx="16" class="node"/>
  <text x="98" y="194" class="label">SUBMITTED</text>
  <text x="98" y="220" class="small">Queued in gate</text>

  <rect x="310" y="160" width="170" height="82" rx="16" class="ok"/>
  <text x="342" y="194" class="label">PROCESSED</text>
  <text x="342" y="220" class="small">Validator saw tx</text>

  <rect x="550" y="160" width="170" height="82" rx="16" class="ok"/>
  <text x="584" y="194" class="label">CONFIRMED</text>
  <text x="584" y="220" class="small">Cluster voted</text>

  <rect x="790" y="160" width="170" height="82" rx="16" class="ok"/>
  <text x="825" y="194" class="label">FINALIZED</text>
  <text x="825" y="220" class="small">Success evidence</text>

  <path d="M240 201 H310" class="arrow"/>
  <path d="M480 201 H550" class="arrow"/>
  <path d="M720 201 H790" class="arrow"/>

  <rect x="70" y="352" width="220" height="92" rx="16" class="bad"/>
  <text x="100" y="388" class="label">FAILED</text>
  <text x="100" y="414" class="small">Low tip / expiry / leader skip</text>

  <rect x="370" y="352" width="250" height="92" rx="16" class="warn"/>
  <text x="400" y="388" class="label">CLASSIFIED</text>
  <text x="400" y="414" class="small">Structured failure category</text>

  <rect x="700" y="352" width="230" height="92" rx="16" class="ai"/>
  <text x="730" y="388" class="label">AI DECISION</text>
  <text x="730" y="414" class="small">Retry strategy + confidence</text>

  <rect x="1010" y="352" width="210" height="92" rx="16" class="ok"/>
  <text x="1040" y="388" class="label">CHILD BUNDLE</text>
  <text x="1040" y="414" class="small">Parent lineage preserved</text>

  <path d="M155 242 V352" class="arrowBad"/>
  <path d="M290 398 H370" class="arrowWarn"/>
  <path d="M620 398 H700" class="arrowAi"/>
  <path d="M930 398 H1010" class="arrow"/>
  <path d="M1115 352 C1115 285 950 285 875 242" class="arrow"/>

  <rect x="120" y="546" width="260" height="74" rx="14" class="node"/>
  <text x="148" y="576" class="label">EXPIRED_BLOCKHASH</text>
  <text x="148" y="600" class="small">Refresh blockhash, rebuild, retry</text>

  <rect x="510" y="546" width="260" height="74" rx="14" class="node"/>
  <text x="538" y="576" class="label">INSUFFICIENT_TIP</text>
  <text x="538" y="600" class="small">Raise percentile + multiplier</text>

  <rect x="900" y="546" width="260" height="74" rx="14" class="node"/>
  <text x="928" y="576" class="label">LEADER_SKIP</text>
  <text x="928" y="600" class="small">Wait leader, refresh, retry</text>
</svg>
